<div class="min-h-screen flex flex-col items-center justify-center px-4 py-10">
  <h1 class="text-4xl font-bold mb-10 uppercase tracking-wide">Contact</h1>
    <form action="https://api.web3forms.com/submit" method="POST"  class="bg-white p-8 rounded-2xl shadow-md border border-gray-600 hover:border-gray-800 w-full max-w-md space-y-6">
        <input type="hidden" name="access_key" value="25c7f386-785f-4ed5-a412-9c027cf8b864">
        <p>Name: <input type="text" name="name" required placeholder="Enter Your Name" class="w-full border border-gray-400 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></p>
        <p>Email:  <input type="email" name="email" required placeholder="Enter Your Email id" class="w-full border border-gray-400 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></p>
        <p>Message: <textarea name="message" required placeholder="Any suggestions" rows="4"
      class="w-full border border-gray-400 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea></p>
    <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
    <button class="bg-blue-500" type="submit" class="block mx-auto text-black border-2 border-black px-6 py-2 rounded-full text-lg hover:bg-blue-500 hover:text-white transition">Submit</button>
</form>
</div>
